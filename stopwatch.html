<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roselina</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;300&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#010a06;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
canvas{position:fixed;inset:0;pointer-events:none}
#ui{position:relative;z-index:20;display:flex;flex-direction:column;align-items:center}
.title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:16px;letter-spacing:10px;color:rgba(160,255,180,0.45);margin-bottom:30px;text-transform:uppercase}
.clock-ring{position:relative;width:300px;height:300px;display:flex;align-items:center;justify-content:center;margin-bottom:40px}
.display{text-align:center;z-index:2}
.time-main{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:88px;letter-spacing:4px;line-height:1;background:linear-gradient(160deg,#d4ffeb 0%,#a0ffcc 40%,#ff9ec4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 16px rgba(100,255,180,0.5))}
.time-ms{font-family:'Montserrat',sans-serif;font-weight:200;font-size:28px;letter-spacing:3px;color:rgba(160,255,200,0.4);margin-top:2px}
.buttons{display:flex;align-items:center;gap:24px;margin-bottom:36px}
.btn{border:none;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:300;letter-spacing:2px;font-size:10px;text-transform:uppercase;transition:transform .15s}
.btn:active{transform:scale(0.9)}
.btn-main{width:86px;height:86px;border-radius:50%;background:linear-gradient(135deg,#00704a,#00c47a,#00ff99);color:#001a0d;box-shadow:0 0 32px rgba(0,200,120,0.6),inset 0 1px 0 rgba(255,255,255,0.3);font-size:12px}
.btn-main.running{background:linear-gradient(135deg,#7a0040,#c9184a,#ff4d6d);color:#fff;box-shadow:0 0 32px rgba(200,30,80,0.6)}
.btn-sub{width:62px;height:62px;border-radius:50%;background:rgba(0,255,150,0.06);color:rgba(160,255,200,0.7);border:1px solid rgba(0,255,150,0.2);backdrop-filter:blur(8px)}
.btn:disabled{opacity:.2;cursor:default;box-shadow:none}
.laps-wrap{width:300px;max-height:200px;overflow-y:auto}
.laps-wrap::-webkit-scrollbar{width:2px}
.laps-wrap::-webkit-scrollbar-thumb{background:rgba(0,200,120,0.3);border-radius:2px}
.lap-item{display:flex;justify-content:space-between;padding:10px 4px;border-bottom:1px solid rgba(0,200,120,0.1);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:300;color:rgba(160,255,200,0.55);letter-spacing:1px}
.lap-item:first-child{border-top:1px solid rgba(0,200,120,0.1)}
.lap-num{color:rgba(0,200,120,0.35);font-size:10px;letter-spacing:2px}
.lap-item.fastest{color:#7fffbe}
.lap-item.slowest{color:rgba(255,150,170,0.5)}
.deco{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:rgba(0,200,120,0.18);letter-spacing:5px;margin-top:24px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="title">Roselina</div>
  <div class="clock-ring">
    <div class="display">
      <div class="time-main"><span id="time">00:00</span></div>
      <div class="time-ms">.<span id="ms">00</span></div>
    </div>
  </div>
  <div class="buttons">
    <button class="btn btn-sub" id="btn-lap" disabled>랩</button>
    <button class="btn btn-main" id="btn-start">시작</button>
    <button class="btn btn-sub" id="btn-reset" disabled>초기화</button>
  </div>
  <div class="laps-wrap"><div id="laps"></div></div>
  <div class="deco">aurora &amp; rose</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d', { alpha: false });
let W, H, cx, cy;

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
  buildStarCache();
  buildRingCache();
}

/* ── 별: 오프스크린 캐시 ── */
let starCache;
function buildStarCache(){
  starCache = new OffscreenCanvas(W, H);
  const sc = starCache.getContext('2d');
  for(let i=0;i<160;i++){
    const x=Math.random()*W, y=Math.random()*H;
    const r=Math.random()*1.1+0.2;
    const a=Math.random()*0.6+0.1;
    sc.beginPath();
    sc.arc(x,y,r,0,Math.PI*2);
    sc.fillStyle=`rgba(200,255,225,${a})`;
    sc.fill();
  }
}

/* ── 오로라 링: 오프스크린 캐시 (색상만 rotate) ── */
let ringCache = [];
const RING_DEFS = [
  {r:148, w:14, a:.85},
  {r:168, w: 8, a:.60},
  {r:186, w: 5, a:.40},
  {r:202, w: 3, a:.25},
];
function buildRingCache(){
  ringCache = RING_DEFS.map(def=>{
    const size = (def.r + def.w + 4)*2;
    const oc = new OffscreenCanvas(size, size);
    const oc2 = oc.getContext('2d');
    const ccx = size/2, ccy = size/2;
    const SEG = 90; // 세그먼트 수 줄임 (360→90)
    const da  = (Math.PI*2)/SEG;
    for(let i=0;i<SEG;i++){
      const angle = i*da;
      const hue   = (i/SEG)*360;
      oc2.beginPath();
      oc2.arc(ccx, ccy, def.r, angle, angle+da*1.2);
      oc2.strokeStyle=`hsla(${hue},100%,65%,${def.a})`;
      oc2.lineWidth=def.w;
      oc2.lineCap='butt';
      oc2.stroke();
    }
    return {canvas: oc, size, r: def.r};
  });
}

/* ── 오로라 배경: 사전 계산된 웨이브를 낮은 빈도로만 업데이트 ── */
let auroraCache = null;
let lastAuroraT = -999;
const AURORA_UPDATE_INTERVAL = 4; // N프레임마다 1회 갱신

function buildAuroraFrame(t){
  const oc = new OffscreenCanvas(W, H);
  const oc2 = oc.getContext('2d');
  const bands = [
    {baseY:.16, r:'0,220,110',  g:'0,150,255', amp:80,  freq:.0016, ph:0     },
    {baseY:.27, r:'60,255,140', g:'0,100,220', amp:60,  freq:.0021, ph:1.2   },
    {baseY:.38, r:'140,255,80', g:'60,180,255',amp:45,  freq:.0025, ph:2.4   },
    {baseY:.10, r:'0,180,255',  g:'120,60,255',amp:90,  freq:.0013, ph:0.6   },
  ];
  bands.forEach(b=>{
    const yBase = b.baseY*H;
    const thick = H*0.20;
    const pts=[];
    for(let x=0;x<=W;x+=8){
      const w =
        Math.sin(x*b.freq + t*.0004 + b.ph)*b.amp +
        Math.sin(x*b.freq*1.8 + t*.00025)*b.amp*.35;
      pts.push({x, y:yBase+w});
    }
    const gr=oc2.createLinearGradient(0,yBase-b.amp,0,yBase+thick+b.amp);
    gr.addColorStop(0,  `rgba(${b.r},0)`);
    gr.addColorStop(.15,`rgba(${b.r},.18)`);
    gr.addColorStop(.4, `rgba(${b.g},.15)`);
    gr.addColorStop(.75,`rgba(${b.r},.06)`);
    gr.addColorStop(1,  `rgba(${b.g},0)`);
    oc2.save();
    oc2.globalCompositeOperation='screen';
    oc2.fillStyle=gr;
    oc2.beginPath();
    oc2.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++){
      const p=pts[i-1],q=pts[i];
      oc2.quadraticCurveTo(p.x,p.y,(p.x+q.x)/2,(p.y+q.y)/2);
    }
    oc2.lineTo(W,yBase+thick);
    oc2.lineTo(0,yBase+thick);
    oc2.closePath();
    oc2.fill();
    oc2.restore();
  });
  return oc;
}

/* ── 꽃잎 ── */
class Petal {
  constructor(init){
    this.x = Math.random()*W;
    this.y = init ? Math.random()*H : -30;
    this.size  = Math.random()*12+7;
    this.rot   = Math.random()*Math.PI*2;
    this.rotV  = (Math.random()-.5)*.025;
    this.vx    = (Math.random()-.5)*.7;
    this.vy    = Math.random()*.8+.35;
    this.sway  = Math.random()*.5+.15;
    this.swayPh= Math.random()*Math.PI*2;
    this.curl  = Math.random()*.5+.25;
    const pal=[[180,20,40],[210,40,70],[240,70,95],[255,110,135],[200,10,50]];
    const c=pal[Math.floor(Math.random()*pal.length)];
    this.color=[c[0],c[1],c[2]];
    this.alpha = Math.random()*.5+.3;
  }
  draw(){
    const s=this.size, [r,g,b]=this.color;
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.rot);
    ctx.globalAlpha=this.alpha;
    const gr=ctx.createRadialGradient(0,-s*.2,0,0,0,s);
    gr.addColorStop(0,  `rgb(${r+40},${g+30},${b+30})`);
    gr.addColorStop(.5, `rgb(${r},${g},${b})`);
    gr.addColorStop(1,  `rgba(${Math.max(0,r-50)},0,10,0.5)`);
    ctx.fillStyle=gr;
    ctx.beginPath();
    ctx.moveTo(0,-s);
    ctx.bezierCurveTo( s*this.curl*1.1,-s*.55, s*.9, s*.2, 0, s);
    ctx.bezierCurveTo(-s*.9, s*.2,-s*this.curl*1.1,-s*.55, 0,-s);
    ctx.fill();
    // 주름
    ctx.beginPath();
    ctx.moveTo(0,-s*.75);
    ctx.quadraticCurveTo(s*.12,0,0,s*.75);
    ctx.strokeStyle=`rgba(${Math.max(0,r-50)},0,10,.3)`;
    ctx.lineWidth=.7;
    ctx.stroke();
    ctx.restore();
  }
  update(t){
    this.y  += this.vy;
    this.x  += this.vx + Math.sin(t*.001+this.swayPh)*this.sway;
    this.rot += this.rotV;
    if(this.y>H+40){ this.y=-30; this.x=Math.random()*W; }
  }
}

const PETAL_COUNT = 24;
const petals = Array.from({length:PETAL_COUNT},(_,i)=>new Petal(true));

/* ── 메인 루프 ── */
let frame=0;
function loop(){
  // 배경
  ctx.fillStyle='#010a06';
  ctx.fillRect(0,0,W,H);

  // 별 (캐시)
  ctx.drawImage(starCache,0,0);

  // 오로라 배경 (N프레임마다 갱신)
  if(frame % AURORA_UPDATE_INTERVAL === 0){
    auroraCache = buildAuroraFrame(frame);
  }
  if(auroraCache) ctx.drawImage(auroraCache,0,0);

  // 오로라 링 (캐시된 이미지를 rotate로 회전 — 재드로우 없음)
  ringCache.forEach((ring,ri)=>{
    ctx.save();
    ctx.globalCompositeOperation='screen';
    ctx.translate(cx,cy);
    ctx.rotate(frame*.00018*(ri+1));
    ctx.drawImage(ring.canvas, -ring.size/2, -ring.size/2);
    ctx.restore();
  });

  // 꽃잎
  petals.forEach(p=>{ p.update(frame); p.draw(); });

  frame++;
  requestAnimationFrame(loop);
}

window.addEventListener('resize',resize);
resize();
loop();

/* ── 스탑워치 ── */
let startTime=0,elapsed=0,timer=null,running=false,lapStart=0,laps=[];
const timeEl=document.getElementById('time');
const msEl=document.getElementById('ms');
const btnStart=document.getElementById('btn-start');
const btnLap=document.getElementById('btn-lap');
const btnReset=document.getElementById('btn-reset');
const lapsEl=document.getElementById('laps');

function fmt(ms){
  const s=Math.floor(ms/1000);
  return{min:Math.floor(s/60).toString().padStart(2,'0'),sec:(s%60).toString().padStart(2,'0'),cent:Math.floor((ms%1000)/10).toString().padStart(2,'0')};
}
function updateDisplay(ms){const{min,sec,cent}=fmt(ms);timeEl.textContent=`${min}:${sec}`;msEl.textContent=cent;}
function renderLaps(){
  if(!laps.length){lapsEl.innerHTML='';return;}
  const times=laps.map(l=>l.time);
  const mn=Math.min(...times),mx=Math.max(...times);
  lapsEl.innerHTML=laps.slice().reverse().map(l=>{
    const cls=laps.length>1?(l.time===mn?'fastest':l.time===mx?'slowest':''):'';
    const{min:m,sec:s,cent:c}=fmt(l.time);
    return`<div class="lap-item ${cls}"><span class="lap-num">LAP ${String(l.num).padStart(2,'0')}</span><span>${m}:${s}.${c}</span></div>`;
  }).join('');
}
btnStart.addEventListener('click',()=>{
  if(!running){
    startTime=Date.now()-elapsed;
    if(!lapStart)lapStart=Date.now();
    timer=setInterval(()=>{elapsed=Date.now()-startTime;updateDisplay(elapsed);},10);
    running=true;btnStart.textContent='중지';btnStart.classList.add('running');
    btnLap.disabled=false;btnReset.disabled=true;
  }else{
    clearInterval(timer);running=false;btnStart.textContent='계속';btnStart.classList.remove('running');
    btnLap.disabled=true;btnReset.disabled=false;
  }
});
btnLap.addEventListener('click',()=>{const now=Date.now();laps.push({num:laps.length+1,time:now-lapStart});lapStart=now;renderLaps();});
btnReset.addEventListener('click',()=>{
  elapsed=0;lapStart=0;laps=[];updateDisplay(0);renderLaps();
  btnStart.textContent='시작';btnStart.classList.remove('running');
  btnLap.disabled=true;btnReset.disabled=true;
});
</script>
</body>
</html>
